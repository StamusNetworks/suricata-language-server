name: Container Mode Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  container-mode-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .
    - name: Test container mode with specific version
      run: |
        suricata-language-server --container --image=jasonish/suricata:7.0.13 --batch-file tests/clean.rules
